services:
  pixelforge:
    build:
      context: .
      dockerfile: Dockerfile
    image: pixelforge:latest
    ports:
      - "5000:5000"
    restart: unless-stopped
    volumes:
      - ./vertex.json:/app/vertex.json
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
